aid: mindtrip
url: https://raw.githubusercontent.com/api-evangelist/mindtrip/refs/heads/main/apis.yml
name: Mindtrip
kind: company
description: >-
  Mindtrip is an AI-powered travel planning platform that lets travelers
  discover destinations, build itineraries, and book flights, hotels,
  restaurants, experiences, and events through a conversational interface and
  collaborative trip workspace. Mindtrip Flights launched in May 2026 as the
  industry's first end-to-end agentic AI flight booking experience, powered by
  partnership with Sabre (travel content / GDS APIs) and PayPal (payments).
  Mindtrip is primarily a consumer product; it does not currently expose a
  general-purpose public REST API, but participates in partner integrations
  (Sabre Mosaic, PayPal, Ripe ITA, GuideGeek) and runs a Creator and Business
  program for destinations and hotels.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
