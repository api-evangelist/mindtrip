specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Mindtrip
providerId: mindtrip
created: '2026-05-22'
modified: '2026-06-02'
reconciled: true
tags:
- Travel
- AI
- Agentic AI
- Booking
- Consumer
description: >-
  Mindtrip is a free consumer travel-planning product with no subscription fee
  and no public developer API, so there is no API-pricing surface to describe.
  Travelers plan, build itineraries, and collaborate at no cost; Mindtrip
  monetizes through booking and affiliate partnerships (flights via Sabre,
  hotels, restaurants, experiences, and events) on a pay-as-you-book basis where
  the traveler pays the supplier's price for any booking they choose to make,
  and through B2B partnerships for destinations, DMOs, hotels, and travel
  suppliers (contact sales). The plans below capture this consumer and B2B
  commercial model, not an API plan.
sources:
- https://mindtrip.ai/
- https://mindtrip.ai/business
- https://www.prnewswire.com/news-releases/mindtrip-launches-travels-first-all-in-one-agentic-ai-flight-booking-experience-powered-by-partnership-with-sabre-and-paypal-302763838.html
plans:
- id: mindtrip-consumer-free
  name: Free
  type: freemium
  description: >-
    Free for travelers. Conversational AI trip planning, itinerary building,
    destination discovery, maps, collaboration, and sharing at no cost. No
    subscription is required to use the product.
  entries:
  - label: Consumer Access
    description: Trip planning, itineraries, collaboration, and discovery
    name: consumer_access
    type: flat
    metric: month
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: '0.00'
    userMultiplied: false
  elements:
  - name: Conversational Trip Planning
  - name: Itinerary Builder
  - name: Destination Discovery
  - name: Collaborative Trip Workspace
  - name: Maps and Sharing
- id: mindtrip-pay-as-you-book
  name: Pay As You Book
  type: pay-as-you-go
  description: >-
    No platform fee. When a traveler books a flight, hotel, restaurant,
    experience, or event through Mindtrip, they pay the supplier's price at
    checkout (PayPal-integrated for flights). Mindtrip earns through booking
    and affiliate partnerships rather than charging the traveler a markup or
    subscription.
  entries:
  - label: Bookings
    description: Flights, hotels, restaurants, experiences, and events booked through Mindtrip
    name: bookings
    type: metered
    metric: varies
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: 'supplier price at checkout'
    userMultiplied: false
  elements:
  - name: Flight Booking
  - name: Hotel Booking
  - name: Restaurant Reservations
  - name: Experiences and Events
- id: mindtrip-business
  name: Mindtrip for Business
  type: enterprise
  description: >-
    B2B partnership program for destinations, DMOs, hotels, and travel
    suppliers to reach Mindtrip travelers, and the channel for Sabre customers
    to participate in the agentic AI travel experience. Commercial terms are
    not publicly published.
  entries:
  - label: Partnership
    description: Destination, supplier, and DMO partnership terms
    name: partnership
    type: flat
    metric: varies
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: 'contact sales'
    userMultiplied: false
  elements:
  - name: Supplier and Destination Partnerships
  - name: Sabre Customer Participation
references:
- name: Mindtrip Website
  url: https://mindtrip.ai/
- name: Mindtrip for Business
  url: https://mindtrip.ai/business
