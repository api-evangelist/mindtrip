specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Mindtrip
providerId: mindtrip
created: '2026-05-22'
modified: '2026-06-02'
reconciled: true
tags:
- Travel
- AI
- Agentic AI
- Consumer
- Rate Limiting
description: >-
  Mindtrip is a consumer travel-planning product and does not publish a public
  developer or partner API. As a result there are no documented per-key,
  per-account, or per-IP API rate limits, no rate-limit response headers, and
  no published throttling policy to capture. Any request throttling that exists
  is internal to the consumer web and mobile clients and is not documented for
  external integrators. Partner integrations (Sabre travel content, PayPal
  payments) are governed by those upstream providers' own rate-limit policies,
  not by a Mindtrip-published API contract. This file records the absence of a
  public Mindtrip API rate-limit surface.
sources:
- https://mindtrip.ai/
- https://mindtrip.ai/business
limits:
- name: No Public API Rate Limits
  scope: account
  metric: varies
  limit: 'not applicable - no public API published'
  notes: >-
    Mindtrip exposes no public developer/partner API, so no external rate
    limits are documented. Revisit if Mindtrip launches a developer program.
policies:
- name: No Published Policy
  description: >-
    There is no public API and therefore no documented retry, backoff,
    idempotency, or throttling policy for external consumers.
- name: Upstream Partner Limits
  description: >-
    Rate limits relevant to Mindtrip's flight and payment flows are enforced by
    Sabre and PayPal under their own developer agreements, not by Mindtrip.
notes:
- No public Mindtrip API exists; this is the honest no-op state, not a scaffold to be filled with invented numbers.
